# Configuration des sites a surveiller.
#
# Chaque entree = un "adapter". Le type "generic_html" couvre la plupart des
# boutiques JCC : on charge une page (recherche/categorie), on selectionne les
# fiches produit via CSS, et on extrait titre / url / prix / disponibilite.
#
# Pour trouver les bons selecteurs sur un site, utilise :
#     python -m src.main probe "<URL>"
# qui affiche la structure de la page pour t'aider a reperer item_selector.
#
# Mots-cles de recherche : on cible One Piece + le set OP-17 (sortie aout 2026).

defaults:
  # Filtre global : un produit n'est retenu que si son titre matche un de ces
  # mots-cles (insensible a la casse). Mets une liste vide pour tout garder.
  #
  # IMPORTANT : sur une page de categorie deja 100% One Piece, beaucoup de titres
  # omettent "one piece" (ex. "Display Pilier du Monde OP-09", "Booster Box EB-02").
  # On elargit donc aux codes de set / types de produit, sinon ces displays sont
  # droppes avant detection. Les sites dont la page melange d'autres gammes peuvent
  # surcharger via une cle "keywords" par site.
  keywords:
    - "one piece"
    - "op-"      # OP-09, OP-17...
    - "op0"      # OP09 sans tiret
    - "op1"      # OP16, OP17...
    - "op2"
    - "eb-"      # extra booster (EB-01, EB-02)
    - "eb0"
    - "prb"      # premium booster (PRB-01)
    - "st-"      # starter deck (ST-21...)
    - "display"
    - "booster"
    - "coffret"
    - "starter"
  # Sous-filtre prioritaire : si rempli, on tague "HOT" les produits qui matchent
  # (ex: le set qui t'interesse). N'exclut rien, sert juste a prioriser l'alerte.
  hot_keywords:
    - "op-17"
    - "op17"
    - "op 17"
    - "display"
    - "booster box"
  # Filtre de LANGUE : on ne veut que l'anglais. On retire les produits dont le
  # titre contient un marqueur de langue non-anglaise (FR / JP / CN / KR).
  # Vide cette liste pour tout garder, quelle que soit la langue.
  exclude_keywords:
    - "français"
    - "francais"
    - "(fr)"
    - "jeu de cartes"      # nom de la gamme francaise (vs "Card Game")
    - "japonais"
    - "japanese"
    - "chinois"
    - "chinese"
    - "coréen"
    - "coreen"
    - "korean"
    # Articles/mots FR presents dans les noms de set francais SANS accent (donc
    # non captes par le detecteur d'accents) mais absents des noms anglais :
    # "OP14 - Les Sept de la Mer d'Azur", "OP13 - Successeurs". Espaces inclus
    # pour ne pas matcher a l'interieur d'un mot (ex. " du " vs "produit").
    - "de la "
    - "de l'"
    - " du "
    - "successeur"
  # Codes de langue detectes comme tokens isoles (ex. "One Piece FR", "- KO -").
  # Certains shops (Play-In, Ludotrotter) decrivent en francais mais taguent la
  # vraie langue ainsi : "EN" reste, "FR/KO/JP/CN" sont retires.
  exclude_lang_codes:
    - "fr"
    - "jp"
    - "jap"
    - "jpn"
    - "ko"
    - "kr"
    - "cn"
    - "chn"
  # Marqueurs des langues VOULUES. Utilises uniquement pour les sites qui declarent
  # une `lang` par defaut exclue (ex. shop FR) : on ne garde alors que les produits
  # explicitement tagues dans une de ces langues. Voir l'option `lang` par site.
  include_lang_codes:
    - "en"
    - "eng"
    - "english"
    - "anglais"
  # Exclusion par TYPE de produit : on veut surtout les displays / booster box et
  # produits scelles interessants, PAS les boosters a l'unite, sleeves et starter
  # decks (vendus partout, sans interet pour le suivi). Logique : detector._is_excluded_type.
  exclude_types:
    # Exclu si le titre contient l'un de ces termes.
    terms:
      - "sleeve"
      - "protège-carte"
      - "protege-carte"
      - "protege carte"
      - "pochette"
      - "starter deck"
      - "deck de démarrage"
      - "deck de demarrage"
      - "deck débutant"
      - "deck debutant"
      - "structure deck"
    # Boosters a l'unite : exclus SEULEMENT si aucun marqueur de lot (bulk_markers)
    # n'est present -> garde "Booster Box", "Display ... Booster", "Boite de 24 boosters".
    single_unit:
      - "booster"
      - "blister"
      - "sachet"
    bulk_markers:
      - "box"
      - "display"
      - "boîte"
      - "boite"
      - "coffret"
      - "présentoir"
      - "presentoir"
      - "carton"
      - "case"

sites:
  # Selecteurs VERIFIES sur la page categorie One Piece (juin 2026).
  # On vise la categorie plutot que la recherche : la recherche Philibert
  # redirige les bots vers l'accueil.
  #
  # STOCK EN JAVASCRIPT : le statut n'est PAS dans le HTML statique. Chaque carte
  # a un <p class="stock-block"> VIDE, rempli en AJAX apres chargement avec la
  # classe `in-stock`/`out-of-stock` et le texte "En stock"/"Rupture". Le bouton
  # "Ajouter au panier" (a[data-action=add]), lui, est TOUJOURS present -> inutile
  # comme signal (il faisait passer tous les epuises pour dispo). D'ou :
  #   - adapter playwright_html (on execute le JS pour peupler .stock-block) ;
  #   - on attend qu'au moins une carte ait son statut resolu (wait_for) ;
  #   - detection par le texte "Rupture" (oos_markers_reliable) ; plus d'in_stock_selector.
  - name: "Philibert"
    type: playwright_html
    enabled: true
    url: "https://www.philibertnet.com/fr/15860-one-piece-le-jeu-de-cartes"
    base_url: "https://www.philibertnet.com"
    interval_seconds: 180
    # Attend la resolution AJAX du stock (sinon .stock-block vide -> faux "dispo").
    wait_for: ".product-card .stock-block.in-stock, .product-card .stock-block.out-of-stock"
    wait_ms: 2500
    oos_markers_reliable: true   # "Rupture" fiable ; son absence = "En stock" confirme
    # Philibert prefixe CHAQUE fiche par "One Piece Le Jeu de Cartes", y compris ses
    # editions anglaises (ex. "... OP16 The Time of Battle - Display"). Le marqueur
    # global "jeu de cartes" les jetterait tous -> on l'ignore ici. Les editions FR
    # restent ecartees par leurs accents ("Decisive") et articles ("de la"/"du").
    exclude_keywords_skip:
      - "jeu de cartes"
    selectors:
      item: "div.product-card"
      title: ".product-card__title"
      link: ".product-card__title"
      price: ".product-card__price"
    out_of_stock_markers:
      - "rupture"
      - "indisponible"
      - "epuise"
      - "bientot disponible"

  # Selecteurs VERIFIES sur la page categorie One Piece (juin 2026).
  - name: "UltraJeux"
    type: generic_html
    enabled: true
    url: "https://www.ultrajeux.com/jeu-1031-one-piece-card-game.html"
    base_url: "https://www.ultrajeux.com/"
    interval_seconds: 180
    selectors:
      item: "div.block_produit"
      title: "p.titre a"
      link: "p.titre a"
      price: "p.prix span.prix, .prix"
    # Chaque carte affiche un libelle .disponibilite ("Disponible"/"Indisponible")
    # -> ruptures fiables : l'absence de "indisponible" vaut "en stock confirme".
    oos_markers_reliable: true
    out_of_stock_markers:
      - "rupture"
      - "indisponible"
      - "epuise"
      - "nous attendons"

  # Magic Bazar redirige desormais vers Play-In : catalogue rendu en JavaScript.
  # -> adapter playwright_html (navigateur headless). Selecteurs VERIFIES (juin 2026).
  - name: "Play-In"
    type: playwright_html
    enabled: true
    url: "https://www.play-in.com/fr/gamme/24/one-piece/catalogue"
    base_url: "https://www.play-in.com"
    interval_seconds: 300
    wait_for: "li.tile--type_catalogItem"
    wait_ms: 3000
    scroll: true
    selectors:
      item: "li.tile--type_catalogItem"
      title: "a[href*='/produit/']"
      link: "a[href*='/produit/']"
      price: ".text--variant_price"
    out_of_stock_markers:
      - "rupture"
      - "indisponible"
      - "epuise"

  # Ludikbazar : URL de categorie One Piece a confirmer (la recherche renvoie 404).
  # A caler avec `python -m src.main probe "<URL>"`. Desactive en attendant.
  - name: "Ludikbazar"
    type: generic_html
    enabled: false
    url: "https://ludikbazar.com/"
    base_url: "https://ludikbazar.com"
    interval_seconds: 180
    selectors:
      item: "li.product-item, .product-item-info"
      title: ".product-item-link"
      link: ".product-item-link"
      price: ".price"
    out_of_stock_markers:
      - "rupture"
      - "indisponible"
      - "epuise"

  # Cardmarket : protege par un challenge Cloudflare ("Just a moment...") qui
  # bloque meme Chromium headless + playwright-stealth. Pour le passer il faudrait
  # FlareSolverr, une API de scraping (ScrapingBee/Zyte) ou un Chromium non-headless
  # sur un vrai display. Hors scope pour l'instant -> desactive.
  # Note : Cardmarket est une marketplace de revendeurs, moins prioritaire que les
  # boutiques pour reperer les *mises en ligne / precommandes* de displays.
  - name: "Cardmarket"
    type: playwright_html
    enabled: false
    url: "https://www.cardmarket.com/en/OnePiece/Products/Booster-Boxes"
    base_url: "https://www.cardmarket.com"
    interval_seconds: 600
    wait_for: "#productRow, .table-body"
    wait_ms: 4000
    selectors:
      item: "[id^=productRow], .table-body > div"
      title: "a"
      link: "a"
      price: ".color-primary, .price"
    out_of_stock_markers:
      - "out of stock"
      - "sold out"

  # =====================================================================
  # Boutiques ajoutees (selecteurs sondes en juin 2026)
  # =====================================================================

  # --- WooCommerce standard ---
  - name: "Ludotrotter"
    type: generic_html
    enabled: true
    url: "https://ludotrotter.fr/categorie-produit/magasin/cartes/one-piece/"
    base_url: "https://ludotrotter.fr"
    interval_seconds: 180
    selectors:
      item: "li.product"
      title: ".woocommerce-loop-product__title"
      link: "a.woocommerce-LoopProduct-link, a.woocommerce-loop-product__link, a"
      price: ".price"
    # WooCommerce : "Ajouter au panier" present = en stock ; sinon "Lire la suite"
    # (precommande en attente, rupture...) = indisponible.
    in_stock_selector: "a.add_to_cart_button, a.ajax_add_to_cart"
    out_of_stock_markers: ["rupture", "epuise", "épuisé", "indisponible"]

  - name: "Comptoir des Ecoliers"
    type: generic_html
    enabled: true
    url: "https://comptoirdesecoliers.com/index.php/product-category/cartes-a-collectionner-2/carte-one-piece/"
    base_url: "https://comptoirdesecoliers.com"
    interval_seconds: 180
    selectors:
      item: "li.product"
      title: ".woocommerce-loop-product__title"
      link: "a.woocommerce-LoopProduct-link, a"
      price: ".price"
    in_stock_selector: "a.add_to_cart_button, a.ajax_add_to_cart"
    out_of_stock_markers: ["rupture", "epuise", "épuisé", "indisponible"]

  # WooCommerce rendu via Elementor (theme custom).
  - name: "Maxi Reves"
    type: generic_html
    enabled: true
    url: "https://maxireves.fr/selection-jeux/jeux-de-cartes-tcg/one-piece-tcg/"
    base_url: "https://maxireves.fr"
    interval_seconds: 180
    selectors:
      item: "div.pdtCard"
      title: "h2.product_title"
      link: "a[href*='/produit/']"
      price: ".woocommerce-Price-amount, .amount"
    # Chaque carte affiche sa disponibilite -> ruptures fiables.
    oos_markers_reliable: true
    out_of_stock_markers: ["rupture", "epuise", "épuisé", "indisponible"]

  # --- Shopify ---
  - name: "Games Avenue (Displays)"
    type: generic_html
    enabled: true
    url: "https://gamesavenue.fr/collections/display-one-piece"
    base_url: "https://gamesavenue.fr"
    interval_seconds: 180
    oos_markers_reliable: true   # Shopify flague "Épuisé" sur les epuises
    selectors:
      item: ".grid__item, li.grid__item, .card"
      title: ".card__heading a, .full-unstyled-link, h3 a"
      link: ".card__heading a, .full-unstyled-link, a"
      price: ".price__regular .money, .price-item--regular, .price, .money"
    out_of_stock_markers: ["épuisé", "epuise", "sold out", "rupture"]

  - name: "Games Avenue (Packs EN)"
    type: generic_html
    enabled: true
    url: "https://gamesavenue.fr/collections/coffret-pack-anglais"
    base_url: "https://gamesavenue.fr"
    interval_seconds: 180
    oos_markers_reliable: true   # Shopify flague "Épuisé" sur les epuises
    selectors:
      item: ".grid__item, li.grid__item, .card"
      title: ".card__heading a, .full-unstyled-link, h3 a"
      link: ".card__heading a, .full-unstyled-link, a"
      price: ".price__regular .money, .price-item--regular, .price, .money"
    out_of_stock_markers: ["épuisé", "epuise", "sold out", "rupture"]

  # Shopify FR specialise One Piece, livraison France confirmee via page livraison.
  # Les titres n'incluent pas toujours "One Piece" (ex. "OP16 Display Box").
  - name: "Carte One Piece"
    type: generic_html
    enabled: true
    url: "https://carteonepiece.fr/collections/displays-et-boosters-eng"
    base_url: "https://carteonepiece.fr"
    interval_seconds: 180
    max_pages: 3
    oos_markers_reliable: true   # Shopify flague "Épuisé" sur les epuises
    keywords:
      - "one piece"
      - "op"
      - "eb"
      - "dp"
      - "ts"
      - "display"
      - "booster"
      - "premium card"
      - "illustration box"
      - "devil fruits"
    selectors:
      item: "li.grid__item, .grid__item, .card-wrapper"
      title: ".card__heading a, .full-unstyled-link, h3 a"
      link: ".card__heading a, .full-unstyled-link, a"
      price: ".price__regular .money, .price-item--regular, .price, .money"
    out_of_stock_markers:
      - "épuisé"
      - "epuise"
      - "sold out"
      - "rupture"
      - "indisponible"

  # Shopify belges. Badge "Épuisé" fiable (verifie via l'API Shopify .js) ->
  # oos_markers_reliable. Souvent tout en rupture (stock ecoule) : on alerte au
  # restock des que le badge disparait.
  - name: "Eclipse TCG"
    type: generic_html
    enabled: true
    url: "https://www.eclipsetcg.be/collections/one-piece"
    base_url: "https://www.eclipsetcg.be"
    interval_seconds: 180
    oos_markers_reliable: true
    selectors:
      item: ".product__card"
      title: ".product__card__title"
      link: ".product__card__title a, .product__card__thumbnail a, a[href*='/products/']"
      price: ".price"
    out_of_stock_markers: ["épuisé", "epuise", "sold out", "rupture", "indisponible"]

  - name: "Outpost Brussels"
    type: generic_html
    enabled: true
    url: "https://outpostbrussels.be/collections/one-piece-1"
    base_url: "https://outpostbrussels.be"
    interval_seconds: 180
    oos_markers_reliable: true
    selectors:
      item: ".grid__item, li.grid__item, .card-wrapper, .card"
      title: ".card__heading a, .full-unstyled-link, h3 a"
      link: ".card__heading a, .full-unstyled-link, a"
      price: ".price__regular .money, .price-item--regular, .price, .money"
    out_of_stock_markers: ["épuisé", "epuise", "sold out", "rupture", "indisponible"]

  # Pokeca.NL : Shopify (theme Hulk) livrant l'UE. Chaque carte porte un badge
  # rupture (.sold_out) fiable -> oos_markers_reliable. ATTENTION : malgre l'URL
  # /en/, le site sert souvent la version NEERLANDAISE (titres "boxen", badge
  # "Uitverkocht") selon la geo/IP du client -> il FAUT les marqueurs NL, sinon
  # tous les epuises passent en "en stock confirme" (faux positifs).
  - name: "Pokeca"
    type: generic_html
    enabled: true
    url: "https://pokeca.nl/en/collections/one-piece-1"
    base_url: "https://pokeca.nl"
    interval_seconds: 180
    oos_markers_reliable: true
    selectors:
      item: "[data-load-more--grid-item], .column.thumbnail"
      title: ".product-details .title, .title"
      link: "a.product-info__caption, a[href*='/products/']"
      price: ".current_price .money, .price .money, .money"
    out_of_stock_markers: ["sold out", "uitverkocht", "niet op voorraad", "épuisé", "epuise", "rupture", "indisponible"]

  # Poke-Geek (FR) : Shopify, theme Foxify (.sf__pcard). ATTENTION : le badge
  # "Épuisé" (.prod__tag--soldout) est TOUJOURS dans le DOM (masque en CSS
  # display:none) -> detection par texte impossible (elle marquerait tout en
  # rupture). Signal fiable : le bouton panier icone recoit la classe `disabled`
  # quand epuise. On cible donc `in_stock_selector` (bouton actif = en stock) et on
  # laisse les marqueurs texte vides. Verifie contre l'API Shopify .js (12/12).
  - name: "Poke-Geek"
    type: generic_html
    enabled: true
    url: "https://www.poke-geek.fr/collections/one-piece"
    base_url: "https://www.poke-geek.fr"
    interval_seconds: 180
    selectors:
      item: ".sf__pcard"
      title: ".sf__pcard-name"
      link: ".sf__pcard-name, a[href*='/products/']"
      price: ".sf__pcard-price"
    in_stock_selector: ".sf__btn-icon.add-to-cart:not(.disabled)"
    out_of_stock_markers: []

  # Nevermint (FR) : Shopify, theme Dawn (.card-wrapper). Meme piege que Poke-Geek :
  # un `.sold-out-message` cache met "Épuisé" dans le texte de CHAQUE carte -> pas
  # de detection par texte. Signal fiable : bouton panier `button[name=add]` avec
  # l'attribut `disabled` quand epuise. On cible `in_stock_selector`. Verifie contre
  # l'API Shopify .js (6/6).
  - name: "Nevermint"
    type: generic_html
    enabled: true
    url: "https://nevermint.fr/collections/one-piece-boites-de-boosters-anglais"
    base_url: "https://nevermint.fr"
    interval_seconds: 180
    selectors:
      item: ".card-wrapper, li.grid__item"
      title: ".card__heading a, .full-unstyled-link"
      link: ".card__heading a, .full-unstyled-link, a[href*='/products/']"
      price: ".price-item--regular, .price-item"
    in_stock_selector: "button[name='add']:not([disabled])"
    out_of_stock_markers: []

  # --- PrestaShop ---
  # Agorajeux (FR) : PrestaShop standard. Flag "Rupture de stock" fiable sur chaque
  # carte. Catalogue mixte FR/EN -> le filtre de langue ecarte les references FR.
  - name: "Agorajeux"
    type: generic_html
    enabled: true
    url: "https://www.agorajeux.com/fr/265-one-piece-card-game"
    base_url: "https://www.agorajeux.com"
    interval_seconds: 180
    selectors:
      item: "article.product-miniature, .product-miniature"
      title: ".product-title a, h3.product-title a, .product-title"
      link: ".product-title a, a.thumbnail, a.product-thumbnail"
      price: ".product-price-and-shipping .price, .price"
    oos_markers_reliable: true
    out_of_stock_markers: ["rupture", "epuise", "épuisé", "indisponible"]

  - name: "Fantastik"
    type: generic_html
    enabled: true
    url: "https://fantastik.fr/944-cartes-one-piece"
    base_url: "https://fantastik.fr"
    interval_seconds: 180
    selectors:
      item: "article.product-miniature"
      title: ".product-miniature__infos a, .product-title a, h2 a, h3 a"
      link: "a.product-miniature__link"
      price: ".product-miniature__prices, .price"
    # PrestaShop flague les epuises -> ruptures fiables.
    oos_markers_reliable: true
    out_of_stock_markers: ["rupture", "epuise", "épuisé", "indisponible"]

  # Ancien theme PrestaShop.
  - name: "Goupiya"
    type: generic_html
    enabled: true
    url: "https://www.goupiya.com/fr/40222-one-piece"
    base_url: "https://www.goupiya.com"
    interval_seconds: 180
    selectors:
      item: "div.product-container"
      title: "a.product-name"
      link: "a.product-name"
      price: "span.price.product-price"
    # Vieux thème PrestaShop : le bouton "Ajouter au panier" porte la classe
    # `disabled` quand le produit est epuise (et perd data-id-product). C'est le
    # signal de stock fiable de la carte -> bouton actif = en stock, sinon rupture.
    in_stock_selector: ".ajax_add_to_cart_button:not(.disabled)"
    out_of_stock_markers: ["rupture", "epuise", "épuisé", "indisponible"]

  # Poke Zenith (FR) : PrestaShop standard (theme Elementor). La categorie parente
  # 101-one-piece agrege TOUTES les sous-categories (displays, boosters, coffrets,
  # tins, premium...) sur ~3 pages -> max_pages. Chaque carte porte un flag fiable
  # "En stock" / "Rupture de stock" -> oos_markers_reliable. Catalogue mixte FR/EN :
  # le filtre de langue ecarte les references FR, garde les "- EN". Selecteurs
  # PrestaShop verifies (juillet 2026).
  - name: "Poke Zenith"
    type: generic_html
    enabled: true
    url: "https://www.pokezenith.com/101-one-piece"
    base_url: "https://www.pokezenith.com"
    interval_seconds: 180
    max_pages: 3
    selectors:
      item: "article.product-miniature, .product-miniature"
      title: ".product-title a, h3.product-title a, .product-title"
      link: ".product-title a, a.thumbnail, a.product-thumbnail"
      price: ".product-price-and-shipping .price, .price"
    oos_markers_reliable: true
    out_of_stock_markers: ["rupture", "epuise", "épuisé", "indisponible"]

  # Oupi.eu : PrestaShop protege par Cloudflare (403 "administrative rules" sur
  # les IP datacenter, y compris en local). On tente via FlareSolverr en CI ; si
  # l'IP runner reste bloquee, ce sera signale en rouge -> a desactiver. Selecteurs
  # PrestaShop standards a confirmer une fois le HTML accessible.
  - name: "Oupi"
    type: generic_html
    enabled: true
    unblock: true
    url: "https://oupi.eu/fr/382-one-piece"
    base_url: "https://oupi.eu"
    # Cloudflare/FlareSolverr : lent a resoudre -> cadence espacee pour ne pas
    # serialiser les boutiques rapides derriere lui (cf. _due_for_check).
    interval_seconds: 600
    selectors:
      item: "article.product-miniature, .product-miniature, .js-product-miniature"
      title: ".product-title a, h3 a, h2 a, .product-name"
      link: ".product-title a, a.thumbnail, a.product-thumbnail, h3 a"
      price: ".price, .product-price-and-shipping, .product-price"
    # Oupi flague fiablement les epuises ("Rupture de stock" sur la carte) ->
    # l'absence de marqueur vaut "en stock confirme". Verifie : ~104 epuises
    # detectes par texte, le reste (dont les cases/displays dispo) -> confirme.
    oos_markers_reliable: true
    out_of_stock_markers: ["rupture", "epuise", "épuisé", "indisponible", "out of stock", "sold out"]

  # --- Plateforme FR proprietaire (PowerBoutique-like) ---
  # SOD Games (BE) : protege par Cloudflare (challenge JS sur toutes les pages).
  # Fetch via FlareSolverr en CI (unblock). Selecteurs verifies via sonde
  # FlareSolverr : blocs `.block_unique_product`, titre `.nomprod_link`, prix
  # `.prixprod`. Signal de stock : bouton "Ajouter au panier" (a.addbasket) present
  # = achetable ; sur cette plateforme il est remplace par un texte de rupture
  # quand l'article est epuise -> in_stock_selector + marqueurs texte en secours.
  - name: "SOD Games"
    type: generic_html
    enabled: true
    unblock: true
    url: "https://www.sodgames.be/one-piece-card-game-b145655.html"
    base_url: "https://www.sodgames.be"
    # Cloudflare/FlareSolverr : cadence espacee (cf. _due_for_check).
    interval_seconds: 600
    selectors:
      item: ".block_unique_product, .produits"
      title: "h3.nomprod .nomprod_link, .nomprod_link, h3.nomprod"
      link: "a.nomprod_link, a.produits-bloc-image"
      price: ".prixprod, .impact_price, .prix"
    in_stock_selector: "a.addbasket"
    out_of_stock_markers: ["rupture", "epuise", "épuisé", "indisponible", "sold out", "uitverkocht"]

  # --- Themes maison ---
  # Fantasy Sphere et Destock TCG partagent le meme moteur (.product-item-info).
  - name: "Fantasy Sphere"
    type: generic_html
    enabled: true
    url: "https://www.fantasysphere.net/jeux-de-cartes-a-collectionner/one-piece-tcg/"
    base_url: "https://www.fantasysphere.net"
    oos_markers_reliable: true   # Magento : epuises marques "Réassort"/"Rupture"
    interval_seconds: 180
    selectors:
      item: "div.product-item-info"
      title: ".product-item-name a"
      link: ".product-item-name a"
      price: ".product-item-price.promo, .product-item-price"
    out_of_stock_markers: ["réassort", "reassort", "rupture", "epuise", "épuisé", "indisponible"]

  - name: "Destock TCG"
    type: generic_html
    enabled: true
    # Cloudflare : bloque l'IP datacenter de la CI -> fetch via FlareSolverr.
    unblock: true
    url: "https://www.destocktcg.fr/jeux-de-cartes-a-collectionner/one-piece-card-game/"
    base_url: "https://www.destocktcg.fr"
    oos_markers_reliable: true   # Magento : epuises marques "Réassort"/"Rupture"
    # Cloudflare/FlareSolverr : cadence espacee (cf. _due_for_check).
    interval_seconds: 600
    selectors:
      item: "div.product-item-info"
      title: ".product-item-name a"
      link: ".product-item-name a"
      price: ".product-item-price.promo, .product-item-price"
    out_of_stock_markers: ["réassort", "reassort", "rupture", "epuise", "épuisé", "indisponible"]

  - name: "Antre Temps"
    type: generic_html
    enabled: true
    url: "https://www.antretemps.com/jeux-de-cartes/one-piece-c899.html"
    base_url: "https://www.antretemps.com"
    interval_seconds: 180
    selectors:
      item: "div.product_box"
      title: "h3.bp_designation"
      link: ".bp_image a, a"
      price: ".bp_prix"
    in_stock_selector: ".articleDispo, .dispoArticle .enstock"
    out_of_stock_markers: ["rupture", "epuise", "épuisé", "indisponible"]

  # --- Sites JavaScript ---
  # Parkage = app React/Material-UI : les classes CSS sont hachees (css-xxx) et
  # instables, mais les URLs produit suivent un motif stable. On cible donc
  # directement les liens produit, et ":self" lit le texte/href du lien lui-meme.
  # Pas de prix fiable (DOM MUI) -> on detecte surtout les apparitions de produits.
  - name: "Parkage"
    type: playwright_html
    enabled: true
    url: "https://www.parkage.com/fr/one-piece-card-game"
    base_url: "https://www.parkage.com"
    interval_seconds: 300
    wait_for: "a[href*='one-piece-card-game-']"
    wait_ms: 3500
    scroll: true
    selectors:
      item: "a[href*='one-piece-card-game-']"
      title: ":self"
      link: ":self"
    out_of_stock_markers: ["rupture", "indisponible", "épuisé"]

  # =====================================================================
  # Boutiques italiennes livrant en France / UE
  # =====================================================================

  # Il Nuovo Mondo : page "Shipping and Returns" mentionne UPS Europe.
  - name: "Il Nuovo Mondo"
    type: generic_html
    enabled: true
    url: "https://www.ilnuovomondoshop.it/en/trading-cards/one-piece-tcg/"
    base_url: "https://www.ilnuovomondoshop.it"
    interval_seconds: 180
    selectors:
      item: "article.product-miniature"
      title: ".product-title a, h3 a, .h3 a"
      link: ".product-title a, h3 a, .h3 a, a.thumbnail"
      price: ".price, .product-price-and-shipping"
    # PrestaShop flague chaque carte epuisee ("Out-of-Stock") -> ruptures fiables :
    # l'absence de flag = en stock confirme.
    oos_markers_reliable: true
    out_of_stock_markers:
      - "out of stock"
      - "sold out"
      - "unavailable"
      - "non disponibile"
      - "esaurito"

  # ONY TCG : page "Spedizioni" indique la livraison dans tous les pays UE.
  - name: "ONY TCG"
    type: generic_html
    enabled: true
    url: "https://www.onytcg.it/en/categoria/preordini-one-piece"
    base_url: "https://www.onytcg.it"
    interval_seconds: 180
    max_pages: 2
    selectors:
      item: ".product-card, article.product-card"
      title: ".product-card__name-link, h3 a"
      link: ".product-card__name-link, h3 a, a.product-card__image-link"
      price: ".product-card__current-price, .product-card__price"
    out_of_stock_markers:
      - "out of stock"
      - "sold out"
      - "unavailable"
      - "non disponibile"
      - "esaurito"

  # Inerdini : page "Shipments" liste explicitement France parmi les pays servis.
  - name: "Inerdini"
    type: generic_html
    enabled: true
    # Cloudflare : bloque l'IP datacenter de la CI -> fetch via FlareSolverr.
    unblock: true
    url: "https://shop.inerdini.it/en/categoria-prodotto/one-piece-tcg/booster-box/"
    base_url: "https://shop.inerdini.it"
    # Cloudflare/FlareSolverr : cadence espacee (cf. _due_for_check).
    interval_seconds: 600
    max_pages: 4
    page_style: path
    selectors:
      item: "li.product, .product"
      title: ".woocommerce-loop-product__title"
      link: "a.woocommerce-LoopProduct-link, a.woocommerce-loop-product__link, a"
      price: ".price"
    in_stock_selector: "a.add_to_cart_button, a.ajax_add_to_cart"
    out_of_stock_markers:
      - "out of stock"
      - "sold out"
      - "unavailable"
      - "non disponibile"
      - "esaurito"

  # tcgame.fr : site Wix. Les classes produit sont hachees (itemShared<NNN>) et
  # changent a chaque redeploiement -> selecteurs non fiables. Desactive : a
  # reconfigurer ponctuellement via `probe` si besoin, ou via l'API Wix interne.
  - name: "TCGame"
    type: playwright_html
    enabled: false
    url: "https://www.tcgame.fr/category/one-piece"
    base_url: "https://www.tcgame.fr"
    interval_seconds: 300
    wait_ms: 4000
    scroll: true
    selectors:
      item: "div[class*=rootContainer]"
      title: "a"
      link: "a"
    out_of_stock_markers: ["rupture", "indisponible", "épuisé"]

  # guizettefamily.com : protege par Cloudflare ("Un instant…"), bloque meme via
  # navigateur headless. Necessite FlareSolverr ou une API de scraping. Desactive.
  - name: "Guizette Family"
    type: playwright_html
    enabled: false
    url: "https://www.guizettefamily.com/categorie/one-piece/"
    base_url: "https://www.guizettefamily.com"
    interval_seconds: 600
    wait_for: "li.product"
    selectors:
      item: "li.product"
      title: ".woocommerce-loop-product__title"
      link: "a"
      price: ".price"
    out_of_stock_markers: ["rupture", "épuisé", "indisponible"]
