name: OP Finder — monitoring

# Surveillance des displays/precommandes One Piece, executee gratuitement sur
# les runners GitHub. Chaque execution boucle ~25 min (check toutes les ~90 s),
# relancee toutes les 30 min -> cadence reelle ~1m30, sans dependre du Mac.

on:
  # GitHub BRIDE fortement le declencheur `schedule` (best-effort) : sur repo
  # gratuit il peut etre retarde de 1 a 4 h. Repo PUBLIC -> minutes illimitees, on
  # compense donc par une BOUCLE LONGUE (voir "Monitor loop", ~2 h) qui surveille
  # en continu pendant tout le run. Le cron sert surtout a garder un run "en
  # attente" pret a enchainer : on le resserre a */15 pour multiplier les chances
  # qu'un declenchement passe le bridage. Aucun empilement possible (voir concurrency).
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:          # bouton "Run workflow" pour lancer a la main

# Un seul run a la fois. cancel-in-progress:false -> un nouveau declenchement
# attend la fin du run courant ; GitHub ne garde qu'UN SEUL run en attente (les
# pending plus anciens sont annules). Resultat : au plus 1 run actif + 1 en
# attente, qui demarre des la fin du precedent -> couverture quasi continue sans
# jamais empiler les executions, meme avec un cron frequent.
concurrency:
  group: op-finder-monitor
  cancel-in-progress: false

# Droits necessaires pour publier le dashboard sur GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    # Boucle de ~2 h + install/deploiement -> ~2 h 10. Marge sous le plafond dur
    # de 6 h de GitHub ; un run bloque relache son verrou de concurrency au bout de
    # 150 min plutot que de tout figer.
    timeout-minutes: 150
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    # FlareSolverr resout les challenges Cloudflare pour les boutiques marquees
    # `unblock: true` (Destock TCG, Inerdini). Accessible sur localhost:8191.
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # packages.microsoft.com renvoie parfois 403 et casse `apt-get update`
          # (et donc `playwright install --with-deps`). On retire ces depots non
          # essentiels avant. Le binaire chromium s'installe sans apt ; les libs
          # systeme via --with-deps deviennent "best effort" (deja presentes sur
          # le runner) pour ne pas faire echouer tout le run sur un hoquet d'infra.
          sudo rm -f /etc/apt/sources.list.d/microsoft* /etc/apt/sources.list.d/azure* 2>/dev/null || true
          python -m playwright install chromium
          python -m playwright install-deps chromium || echo "install-deps best-effort : libs probablement deja presentes"

      # Restaure la base SQLite de l'execution precedente (etat = anti-doublon).
      # Cle unique par run + restore-keys pour recuperer le cache le plus recent.
      # IMPORTANT : actions/cache/restore (et NON actions/cache combine) -> seul
      # le variant `restore` expose `cache-matched-key`, dont depend la condition
      # du seed. Avec l'action combinee, `cache-matched-key` est toujours vide ->
      # le seed s'executait a CHAQUE run et aucune alerte n'etait jamais envoyee.
      - name: Restore state
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: data/op_finder.db
          # v2 : invalide les anciens caches (stock_status calcule par l'ancien
          # code) -> 1 seed frais propre, puis alerting normal sans burst.
          key: op-finder-state-v2-${{ github.run_id }}
          restore-keys: |
            op-finder-state-v2-

      # Premier lancement (aucun cache) : on amorce la base SANS alerter,
      # pour ne pas recevoir tout le catalogue existant d'un coup.
      - name: Seed on first run
        if: steps.cache.outputs.cache-matched-key == ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FLARESOLVERR_URL: http://localhost:8191/v1
        run: python -m src.main seed

      # Boucle de surveillance : check toutes les ~90 s pendant ~25 min.
      - name: Monitor loop
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FLARESOLVERR_URL: http://localhost:8191/v1
        run: |
          # Boucle LONGUE (~2 h) : on surveille en continu pendant tout le run pour
          # combler le bridage du cron. Un passage complet sur tous les sites prend
          # ~3-5 min (dont les sites Cloudflare via FlareSolverr), + 30 s de pause ->
          # cadence reelle ~4-6 min par site, contre ~1-4 h avant. Le run suivant
          # (garde "en attente" par la concurrency) enchaine des la fin de celui-ci.
          END=$((SECONDS + 7200))
          while [ $SECONDS -lt $END ]; do
            python -m src.main once
            sleep 30
          done

      # Sauvegarde l'etat pour la prochaine execution (cache toujours mis a jour,
      # meme si la boucle a ete interrompue, pour ne pas re-alerter).
      # success() volontaire (pas always()) : un run annule ne doit pas re-sauver
      # un etat partiel/perime par-dessus le cache.
      - name: Save state
        if: success()
        uses: actions/cache/save@v4
        with:
          path: data/op_finder.db
          key: op-finder-state-v2-${{ github.run_id }}

      # ---- Publication du dashboard sur GitHub Pages ----
      # Snapshot genere apres la boucle, donc la page publiee reflete le dernier etat connu.
      - name: Build dashboard snapshot
        # Les secrets Telegram sont passes ici aussi : sinon le badge du dashboard
        # affiche "Telegram a configurer" a tort (l'etape ne les verrait pas).
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main snapshot site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
