name: OP Finder — publish dashboard

# Publication RAPIDE du dashboard, decouplee de la boucle de monitoring (~2 h).
# But : une modif d'UI (template, CSS, JS du dashboard) doit etre en ligne en
# ~1-2 min, sans attendre la fin d'un run de veille. On ne relance PAS de sonde
# ici : on rend juste le HTML a partir du dernier etat SQLite connu (cache en
# lecture seule) et on deploie sur GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      # Seules les modifs qui changent le rendu du dashboard declenchent une
      # republication. La veille (monitor.yml) republie de son cote a chaque run.
      - "src/dashboard/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:          # bouton "Run workflow" pour republier a la main

# Groupe distinct du monitor : une republication ne doit jamais attendre derriere
# un run de veille de ~2 h. cancel-in-progress -> un nouveau push d'UI remplace
# une publication encore en attente (inutile de deployer une version deja perimee).
concurrency:
  group: op-finder-publish
  cancel-in-progress: true

# Droits pour publier sur GitHub Pages (idem monitor.yml).
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Pas de Playwright ni de FlareSolverr : le snapshot ne fait que rendre le
        # template Jinja + lire la base. On installe juste les deps Python.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Recupere la base de l'execution de veille la plus recente pour que la page
      # publiee reflete le dernier etat connu. RESTORE seul (lecture) : on ne
      # resauvegarde pas, pour ne pas interferer avec le cache du monitor.
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: data/op_finder.db
          key: op-finder-state-v2-${{ github.run_id }}
          restore-keys: |
            op-finder-state-v2-

      # Rend le dashboard. Si aucun cache n'existe (cas rare), init_db cree une base
      # vide et la page se rend quand meme, sans donnees.
      - name: Build dashboard snapshot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main snapshot site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
