name: Probe (jetable)

on:
  workflow_dispatch:
    inputs:
      site:
        description: "Nom du site (config.yaml)"
        required: true
        default: "Poke-Geek"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/probe_flaresolverr.py "${{ inputs.site }}"
