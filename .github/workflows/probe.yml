name: Probe (jetable)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL a sonder"
        required: true
      item:
        description: "Selecteur CSS d'item"
        required: true

jobs:
  probe:
    runs-on: ubuntu-latest
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx beautifulsoup4
      - env:
          FLARESOLVERR_URL: http://localhost:8191/v1
        run: python scripts/probe_flaresolverr.py "${{ inputs.url }}" "${{ inputs.item }}"
