name: Probe (jetable)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL de base"
        required: true
      item:
        description: "Selecteur CSS d'item"
        required: true
      delay:
        description: "Delai entre pages (s)"
        required: false
        default: "2"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx beautifulsoup4
      - run: python scripts/probe_flaresolverr.py "${{ inputs.url }}" "${{ inputs.item }}" "${{ inputs.delay }}"
